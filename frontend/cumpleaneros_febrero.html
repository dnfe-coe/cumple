<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cumpleañeros del Mes - TIGRES COE</title>

  <style>
    :root {
      --azul-oscuro: #0a192f;
      --blanco: #ffffff;
      --gris: #e6e9f0;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--gris);
      color: var(--azul-oscuro);
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: auto;
      background: var(--blanco);
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,.15);
    }

    /* HEADER */
    .header {
      background: var(--azul-oscuro);
      color: var(--blanco);
      padding: 20px;
      border-radius: 10px;
      display: grid;
      grid-template-columns: 120px 1fr 120px;
      align-items: center;
      margin-bottom: 25px;
    }

    .header img {
      width: 90px;
      margin: auto;
    }

    .header h1 {
      text-align: center;
      font-size: 1.8em;
      line-height: 1.3;
    }

    .header h2 {
      text-align: center;
      font-size: 1.2em;
      font-weight: normal;
      margin-top: 5px;
      opacity: .9;
    }

    /* TITULO */
    .title {
      text-align: center;
      margin-bottom: 20px;
      font-size: 1.6em;
      font-weight: bold;
    }

    /* TABLA */
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    thead {
      background: var(--azul-oscuro);
      color: var(--blanco);
    }

    th, td {
      padding: 12px 14px;
      border: 1px solid #ddd;
      text-align: center;
    }

    tbody tr:nth-child(even) {
      background: #f5f7fb;
    }

    tbody tr:hover {
      background: #dde6f5;
    }

    .footer {
      margin-top: 25px;
      text-align: center;
      font-size: .9em;
      opacity: .8;
    }
  </style>
</head>

<body>

  <div class="container">

    <!-- ENCABEZADO INSTITUCIONAL -->
    <div class="header">
      <img src="/img/logo_izquierdo.jpeg" alt="Icono Izquierdo">
      
      <div>
        <h1>BASE DE DESPLIEGUE OPERACIONAL</h1>
        <h2>TIGRES - COE REGIÓN NORTE</h2>
      </div>
      
      <img src="/img/logo_derecho.jpeg" alt="Icono Derecho">
    </div>

    <!-- TITULO -->
    <div class="title">
      Cumpleañeros del Mes de Febrero
    </div>

    <!-- TABLA -->
    <table>
      <thead>
        <tr>
          <th>N°</th>
          <th>Grado</th>
          <th>Nombre</th>
          <th>Fecha Nacimiento</th>
        </tr>
      </thead>
      <tbody id="tablaCumpleaneros"></tbody>
    </table>

    <div class="footer">
      Sistema Administrativo Institucional - TIGRES COE
    </div>

  </div>

<script>

  function parseLocalDate(dateString) {

    const [year, month, day] = dateString.split("-").map(Number);

    return new Date(year, month - 1, day);

  }



  async function cargarCumpleanerosFebrero() {

    try {

      const response = await fetch("/data/funcionarios.json");

      const data = await response.json();

      const funcionarios = data.funcionarios;



      const tbody = document.getElementById("tablaCumpleaneros");



      const febrero = funcionarios.filter(f => {

        const fecha = parseLocalDate(f.fecha_cumple);

        return fecha.getMonth() === 1; // Febrero = 1

      });



      let html = "";



      febrero.forEach((f, index) => {

        const fecha = parseLocalDate(f.fecha_cumple).toLocaleDateString("es-HN");



        html += `

          <tr>

            <td>${index + 1}</td>

            <td>${f.rango}</td>

            <td>${f.nombre}</td>

            <td>${fecha}</td>

          </tr>

        `;

      });



      tbody.innerHTML = html;



    } catch (error) {

      console.error("Error cargando funcionarios:", error);

    }

  }



  cargarCumpleanerosFebrero();

</script>
</body>
</html>
